<!DOCTYPE html>
<html>
<body>

<h2>Agregar Unidad</h2>

<input type="text" id="nombre" placeholder="Ej: Litros">
<button onclick="guardar()">Guardar</button>

<button onclick="ver()">Ver unidades</button>

<div id="resultado"></div>

<script>
function guardar(){
  const nombre = document.getElementById("nombre").value;

  fetch("/api/unidades", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ nombre })
  })
  .then(res => res.json())
  .then(data => {
    alert("Guardado");
  });
}

function ver(){
  fetch("/api/unidades")
  .then(res => res.json())
  .then(data => {
    document.getElementById("resultado").innerHTML =
      JSON.stringify(data, null, 2);
  });
}
</script>

</body>
</html>
